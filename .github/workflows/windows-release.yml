name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "VERSION=${{ github.event.inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            $tag = "${{ github.ref_name }}"
            "VERSION=$($tag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows package
        shell: pwsh
        run: .\tools\build_windows.ps1 -Version $env:VERSION -GitHubRepo $env:GITHUB_REPOSITORY

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $assets = @(
            "release\PicadillyStudio-$env:VERSION-win-x64.zip",
            "release\latest.json"
          )
          $installer = "release\PicadillyStudioSetup-$env:VERSION.exe"
          if (Test-Path $installer) {
            $assets += $installer
          }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $assets --title "Picadilly Studio $env:VERSION" --notes "Windows release $env:VERSION"
          } else {
            gh release upload $tag $assets --clobber
          }
