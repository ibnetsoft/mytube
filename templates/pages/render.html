{% extends "base.html" %}

{% block content %}
<div class="flex flex-col gap-3 p-2">
    <!-- Main Workspace (Grid) -->
    <div class="grid grid-cols-12 gap-3 lg:gap-5">

        <!-- Left Panel: Controls, Status & Logs (Col-6) -->
        <div class="col-span-12 lg:col-span-6 flex flex-col gap-3">
            <!-- 1. Top Control Bar -->
            <div class="flex items-center gap-3 p-2 bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 shrink-0 flex-wrap">

        <!-- Resolution & Settings -->
        <div class="flex items-center gap-2 border-r border-gray-200 dark:border-gray-600 pr-3">
            <span class="text-xs font-bold text-gray-700 dark:text-gray-300">해상도</span>
            <select id="resolution"
                class="text-xs border-gray-300 dark:border-gray-600 rounded py-1 bg-gray-50 dark:bg-gray-700 dark:text-white">
                <option value="720p">720p (HD)</option>
                <option value="1080p">1080p (Full HD)</option>
            </select>
            <input type="hidden" id="aspectRatio" value="16:9">
            <label class="flex items-center gap-1 cursor-pointer ml-3">
                <input type="checkbox" id="useSubtitles" class="w-3 h-3 text-blue-600 rounded" checked>
                <span class="text-xs text-gray-600 dark:text-gray-300 select-none">자막 포함</span>
            </label>
        </div>

        <!-- Render Button -->
        <button onclick="createVideo()" id="renderBtn"
            class="btn-primary py-1.5 px-6 text-sm font-bold flex items-center gap-2 shadow-sm hover:shadow-md transition-all ml-auto">
            <span>🎬 렌더링 시작</span>
        </button>
    </div>

    <!-- 2. Render Queue Panel -->
    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-3 shrink-0">
        <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
            <div class="flex items-center gap-2">
                <h4 class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wide">⏳ 렌더링 대기 큐</h4>
                <span id="queueCount" class="text-[10px] bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 px-1.5 py-0.5 rounded-full font-bold">0</span>
            </div>
            <!-- Mode Filter Tabs -->
            <div class="flex items-center gap-1">
                <button onclick="setQueueFilter('all')" id="queueTab_all"
                    class="queue-tab active text-[10px] px-2 py-1 rounded border transition-all">전체</button>
                <button onclick="setQueueFilter('longform')" id="queueTab_longform"
                    class="queue-tab text-[10px] px-2 py-1 rounded border transition-all">롱폼</button>
                <button onclick="setQueueFilter('shorts')" id="queueTab_shorts"
                    class="queue-tab text-[10px] px-2 py-1 rounded border transition-all">쇼츠</button>
            </div>
            <div class="flex items-center gap-2 ml-auto">
                <button onclick="toggleSelectAll()" id="selectAllBtn"
                    class="text-[10px] bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600">
                    전체 선택
                </button>
                <button onclick="startBatchRender()" id="batchRenderBtn"
                    class="text-[10px] bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded font-bold disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    ▶ 선택 렌더링 시작
                </button>
                <button onclick="loadRenderQueue()" class="text-[10px] text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">↻</button>
            </div>
        </div>

        <!-- Queue List -->
        <div id="queueList" class="flex flex-col gap-1 max-h-[180px] overflow-y-auto custom-scrollbar">
            <div class="text-xs text-gray-400 text-center py-3">대기 중인 프로젝트가 없습니다.</div>
        </div>

        <!-- Batch Progress -->
        <div id="batchProgressArea" class="hidden mt-2 pt-2 border-t border-gray-200 dark:border-gray-600">
            <div class="flex items-center justify-between text-[10px] text-gray-500 mb-1">
                <span id="batchProgressLabel">렌더링 중...</span>
                <span id="batchProgressCount">0/0</span>
            </div>
            <div class="h-1.5 bg-gray-200 dark:bg-gray-700 rounded overflow-hidden">
                <div id="batchProgressBar" class="h-full bg-blue-500 transition-all duration-300" style="width:0%"></div>
            </div>
        </div>
    </div>

            <!-- Project Status Summary -->
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-3 shrink-0">
                <h4 class="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide dark:text-gray-400">프로젝트 상태</h4>
                <div class="grid grid-cols-2 gap-2">
                    <div id="scriptStatus" class="status-item">📝 대본</div>
                    <div id="imageStatus" class="status-item">🖼️ 이미지</div>
                    <div id="audioStatus" class="status-item">🔊 오디오</div>
                    <div id="videoStatus" class="status-item">🎬 비디오</div>
                </div>
            </div>

            <!-- Intro Video Section (Compact) -->
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-3 shrink-0">
                <div class="flex justify-between items-center mb-2">
                    <h4 class="text-xs font-bold text-gray-500 uppercase dark:text-gray-400">인트로 영상</h4>
                    <button onclick="document.getElementById('introFileInput').click()"
                        class="text-[10px] bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded hover:bg-gray-200">
                        📁 업로드
                    </button>
                    <input type="file" id="introFileInput" accept="video/*" class="hidden">
                </div>
                <!-- Preview area -->
                <div id="introPreview" class="hidden relative aspect-video bg-black rounded overflow-hidden group">
                    <video id="introVideoPlayer" class="w-full h-full object-cover"></video>
                    <button onclick="deleteIntroVideo()"
                        class="absolute top-1 right-1 bg-red-600 text-white p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity text-[10px]">🗑️</button>
                </div>
                <div id="introEmpty"
                    class="text-center p-2 text-xs text-gray-400 border border-dashed rounded bg-gray-50 dark:bg-gray-900/50">
                    업로드된 인트로 영상이 없습니다.
                </div>
            </div>

            <!-- Render Log / Console -->
            <div
                class="bg-gray-900 rounded-lg border border-gray-800 p-3 overflow-hidden flex flex-col font-mono text-xs text-green-400 h-[300px]">
                <div class="flex justify-between border-b border-gray-800 pb-1 mb-2">
                    <span>>_ 렌더링 진행 로그</span>
                    <span id="renderTimer" class="text-yellow-400">00:00</span>
                </div>
                <div id="renderLogContent"
                    class="flex-1 overflow-y-auto custom-scrollbar opacity-80 whitespace-pre-wrap">
                    렌더링 준비 완료
                </div>
                <!-- Progress Bar overlaid in log -->
                <div class="mt-2 h-1 bg-gray-800 rounded overflow-hidden">
                    <div id="renderProgressBar" class="h-full bg-green-500 transition-all duration-300"
                        style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Preview & Downloads (Col-6) -->
        <div
            class="col-span-12 lg:col-span-6 flex flex-col bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm relative min-h-[500px]">

            <!-- Video Player Area -->
            <div class="flex-1 bg-black relative flex items-center justify-center group rounded-t-lg overflow-hidden">
                <!-- Removed max-h-full to allow natural height but constrain max to viewport-ish logic via CSS if needed. 
                     Keeping max-h-[80vh] is safer. -->
                <video id="mainVideoPlayer" controls class="max-w-full max-h-[80vh] w-auto h-auto shadow-2xl"></video>

                <!-- Placeholder / Loading State -->
                <div id="videoPlaceholder"
                    class="absolute inset-0 flex flex-col items-center justify-center bg-gray-100 dark:bg-gray-900 text-gray-400 z-0">
                    <span class="text-6xl mb-4 animate-pulse">🎬</span>
                    <p>렌더링이 완료되면 여기에 영상이 표시됩니다.</p>
                </div>
            </div>

            <!-- Action Footer -->
            <div
                class="p-3 bg-gray-50 dark:bg-gray-700/50 border-t border-gray-200 dark:border-gray-600 flex justify-between items-center shrink-0 rounded-b-lg">
                <div class="flex gap-2">
                    <button onclick="downloadScript()" class="text-xs btn-secondary px-2">📝 대본</button>
                    <button onclick="downloadPrompts()" class="text-xs btn-secondary px-2">🖼️ 이미지</button>
                </div>
                <div class="flex gap-2">
                    <a id="downloadVideoBtn" href="#"
                        class="btn-primary py-1.5 px-4 text-sm font-bold opacity-50 pointer-events-none transition-opacity">
                        💾 최종 영상 다운로드
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .status-item {
        @apply flex items-center justify-center py-2 px-1 rounded bg-gray-50 dark:bg-gray-700 text-xs font-medium text-gray-500 border border-gray-100 dark:border-gray-600;
    }

    .status-item.done {
        @apply bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 border-green-200 dark:border-green-800;
    }

    .queue-tab {
        @apply bg-gray-50 dark:bg-gray-700 border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-400;
    }
    .queue-tab.active {
        @apply bg-blue-600 border-blue-600 text-white;
    }
    .queue-item {
        @apply flex items-center gap-2 px-2 py-1.5 rounded border border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/40 text-xs;
    }
    .queue-item.rendering {
        @apply border-blue-300 dark:border-blue-700 bg-blue-50 dark:bg-blue-900/20;
    }
    .queue-item.done {
        @apply border-green-300 dark:border-green-700 bg-green-50 dark:bg-green-900/20 opacity-60;
    }
    .queue-item.failed {
        @apply border-red-300 dark:border-red-700 bg-red-50 dark:bg-red-900/20;
    }
</style>

<script>
    let isPolling = false;

    document.addEventListener('DOMContentLoaded', async () => {
        // URL 쿼리 파라미터로 넘어온 project_id 처리 (오토파일럿 등)
        const urlParams = new URLSearchParams(window.location.search);
        const urlProjectId = urlParams.get('project_id');
        if (urlProjectId) setCurrentProject(urlProjectId);

        const projectId = getCurrentProject();
        if (!projectId) return Utils.showToast("{{ t('toast_select_project_first') }}", 'warning');

        try {
            const data = await API.project.getFull(projectId);
            updateStatusUI(data);

            // [NEW] Aspect Ratio Check (Prioritize project app_mode)
            const isShortsProject = data.project?.app_mode === 'shorts' || data.project?.is_shorts === true;
            // Force 9:16 for shorts, 16:9 for longform according to user request
            const ratio = isShortsProject ? '9:16' : '16:9';
            
            // Set hidden field so createVideo() picks it up
            const aspectInput = document.getElementById('aspectRatio');
            if (aspectInput) aspectInput.value = ratio;

            if (ratio === '9:16') {
                // Adjust Intro Preview
                const introBox = document.getElementById('introPreview');
                introBox.classList.remove('aspect-video');
                introBox.style.aspectRatio = '9/16';
                introBox.classList.add('max-h-[250px]', 'w-auto', 'mx-auto');

                // Adjust Main Player - Make it feel like a large vertical phone
                const player = document.getElementById('mainVideoPlayer');
                player.style.setProperty('aspect-ratio', '9/16', 'important');
                player.style.setProperty('height', '80vh', 'important');
                player.style.setProperty('width', 'auto', 'important');
                player.classList.remove('w-auto'); // cleanup
                player.classList.add('mx-auto', 'border-[6px]', 'border-gray-800', 'rounded-[30px]', 'shadow-2xl');
                
                // Adjust Wrapper
                const wrapper = player.parentElement;
                wrapper.classList.remove('bg-black');
                wrapper.classList.add('bg-gray-100', 'dark:bg-gray-900', 'p-4');
            }

            // Check for existing video
            const vPath = data.settings?.video_path || data.project?.video_path;
            if (vPath) showVideoResult(vPath);

            // Existing Intro
            if (data.intro_video_path || data.project?.intro_video_path) {
                showIntroPreview(data.intro_video_path || data.project?.intro_video_path);
            }

            // Check if rendering
            if (data.project?.status === 'rendering') {
                startRenderingUI();
                pollRenderStatus(projectId);
            }
        } catch (e) { console.error(e); }

        // Intro Upload Binding directly
        document.getElementById('introFileInput').addEventListener('change', uploadIntro);
    });

    function updateStatusUI(data) {
        // Simple status checker
        const setStatus = (id, valid) => {
            const el = document.getElementById(id);
            if (valid) el.classList.add('done');
            else el.classList.remove('done');
        };

        setStatus('scriptStatus', data.script && data.script.full_script);
        setStatus('imageStatus', data.image_prompts && data.image_prompts.length > 0);
        setStatus('audioStatus', data.tts && data.tts.audio_path);
        setStatus('videoStatus', data.settings?.video_path);
    }

    async function createVideo() {
        const projectId = getCurrentProject();
        if (isPolling) return;

        const resolution = document.getElementById('resolution').value;
        const aspect_ratio = document.getElementById('aspectRatio').value;
        const sub = document.getElementById('useSubtitles').checked;
        const btn = document.getElementById('renderBtn');

        Utils.setLoading(btn, true, "로딩 중...");

        try {
            const res = await API.project.render(projectId, { resolution, aspect_ratio, useSubtitles: sub });
            if (res.status === 'processing') {
                startRenderingUI();
                pollRenderStatus(projectId);
            } else {
                Utils.showToast("실패: " + (res.message || 'Error'), 'error');
                Utils.setLoading(btn, false);
            }
        } catch (e) {
            Utils.showToast("오류 발생", 'error');
            Utils.setLoading(btn, false);
        }
    }

    function startRenderingUI() {
        isPolling = true;
        document.getElementById('renderBtn').disabled = true;
        document.getElementById('renderBtn').innerHTML = `<span class="animate-spin">⏳</span> {{ t('status_loading') }}`;

        const log = document.getElementById('renderLogContent');
        log.innerHTML += `\n[${new Date().toLocaleTimeString()}] 비디오 렌더링 시작...`;

        // Start Timer
        let sec = 0;
        window.renderTimer = setInterval(() => {
            sec++;
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            document.getElementById('renderTimer').innerText = `${m}:${s}`;
        }, 1000);
    }

    async function pollRenderStatus(projectId) {
        if (!isPolling) return;

        try {
            const statusRes = await fetch(`/api/project/${projectId}/render/status`);
            const prog = await statusRes.json();

            if (prog && prog.progress !== undefined) {
                document.getElementById('renderProgressBar').style.width = prog.progress + '%';
                // Update log occasionally or if message changes? 
                // For now just console simulated log
                // const log = document.getElementById('renderLogContent');
                // log.scrollTop = log.scrollHeight; 
            }

            const data = await API.project.getFull(projectId);
            if (data.settings?.video_path) {
                // Done
                finishRendering(data.settings.video_path);
                return;
            }
            if (data.project?.status === 'failed') {
                failRendering();
                return;
            }
        } catch (e) { }

        setTimeout(() => pollRenderStatus(projectId), 1000);
    }

    function finishRendering(path) {
        isPolling = false;
        clearInterval(window.renderTimer);
        document.getElementById('renderProgressBar').style.width = '100%';
        document.getElementById('renderLogContent').innerHTML += `\n[DONE] 렌더링 성공!`;

        const btn = document.getElementById('renderBtn');
        btn.disabled = false;
        btn.innerHTML = `<span>🎬 다시 렌더링</span>`;

        showVideoResult(path);
        Utils.showToast("비디오 제작이 완료되었습니다!", 'success');

        // Update Video Status Indicator
        document.getElementById('videoStatus').classList.add('done');

        // [NEW] Update Stepper
        if (window.updateStepStatus) window.updateStepStatus('render', true);
    }

    function failRendering() {
        isPolling = false;
        clearInterval(window.renderTimer);
        document.getElementById('renderProgressBar').style.backgroundColor = 'red';
        document.getElementById('renderLogContent').innerHTML += `\n[ERROR] 렌더링 실패.`;
        const btn = document.getElementById('renderBtn');
        btn.disabled = false;
        btn.innerHTML = `<span>⚠️ 재시도</span>`;
        Utils.showToast("렌더링 중 오류가 발생했습니다.", 'error');
    }

    function showVideoResult(path) {
        let url = path;
        if (!url.startsWith('/output') && !url.startsWith('http')) {
            url = `/output/${path.split(/[/\\]/).pop()}`;
        }
        url += `?t=${Date.now()}`;

        const player = document.getElementById('mainVideoPlayer');
        player.src = url;
        player.load();

        document.getElementById('videoPlaceholder').style.display = 'none';
        player.classList.remove('hidden');

        const dlBtn = document.getElementById('downloadVideoBtn');
        dlBtn.href = url;
        dlBtn.download = `video_${Date.now()}.mp4`;
        dlBtn.classList.remove('opacity-50', 'pointer-events-none');
    }

    // Intro Video Logic
    async function uploadIntro(e) {
        const file = e.target.files[0];
        if (!file) return;
        const projectId = getCurrentProject();

        const formData = new FormData();
        formData.append('file', file);

        Utils.showToast("업로드 중...", 'info');
        try {
            const res = await fetch(`/api/video/upload-intro/${projectId}`, { method: 'POST', body: formData });
            const data = await res.json();
            if (data.status === 'success') {
                showIntroPreview(data.intro_path);
                Utils.showToast("인트로 영상이 적용되었습니다.", 'success');
            } else Utils.showToast(data.error, 'error');
        } catch (err) { Utils.showToast("업로드 실패", 'error'); }
        e.target.value = '';
    }

    function showIntroPreview(path) {
        document.getElementById('introEmpty').classList.add('hidden');
        document.getElementById('introPreview').classList.remove('hidden');
        const player = document.getElementById('introVideoPlayer');
        player.src = '/' + path; // naive path fix, might need adjustment
        player.load();
    }

    async function deleteIntroVideo() {
        if (!confirm("삭제하시겠습니까?")) return;
        const projectId = getCurrentProject();
        await fetch(`/api/video/delete-intro/${projectId}`, { method: 'DELETE' });
        document.getElementById('introPreview').classList.add('hidden');
        document.getElementById('introEmpty').classList.remove('hidden');
        Utils.showToast("삭제 완료", 'success');
    }

    function downloadScript() { /* ... existing logic ... */ }
    function downloadPrompts() { /* ... existing logic ... */ }

    // ========== Render Queue System ==========
    let _allQueueItems = [];
    let _queueFilter = 'all';
    let _isBatchRendering = false;
    let _queueAutoRefreshTimer = null;

    async function loadRenderQueue() {
        try {
            const res = await fetch('/api/render-queue');
            const data = await res.json();
            if (data.status === 'ok') {
                _allQueueItems = data.queue || [];
                renderQueueList();
            }
        } catch (e) { console.error('Queue load error', e); }
    }

    function setQueueFilter(mode) {
        _queueFilter = mode;
        document.querySelectorAll('.queue-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`queueTab_${mode}`).classList.add('active');
        renderQueueList();
    }

    function getFilteredQueue() {
        if (_queueFilter === 'all') return _allQueueItems;
        return _allQueueItems.filter(p => (p.app_mode || 'longform') === _queueFilter);
    }

    function renderQueueList() {
        const list = document.getElementById('queueList');
        const items = getFilteredQueue();
        document.getElementById('queueCount').textContent = _allQueueItems.length;

        if (items.length === 0) {
            list.innerHTML = '<div class="text-xs text-gray-400 text-center py-3">대기 중인 프로젝트가 없습니다.</div>';
            return;
        }

        list.innerHTML = items.map((p, idx) => {
            const modeTag = p.app_mode === 'shorts'
                ? '<span class="text-[9px] bg-purple-100 dark:bg-purple-900/40 text-purple-600 dark:text-purple-300 px-1 rounded">쇼츠</span>'
                : '<span class="text-[9px] bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300 px-1 rounded">롱폼</span>';
            const itemState = p._batchState || '';
            const stateIcon = itemState === 'rendering' ? '<span class="animate-spin text-blue-500">⏳</span>'
                : itemState === 'done' ? '<span class="text-green-500">✓</span>'
                : itemState === 'failed' ? '<span class="text-red-500">✗</span>'
                : '';
            const displayName = p.display_name || p.name || p.topic || `프로젝트 ${p.id}`;
            const estTime = p.est_time ? `<span class="text-[9px] bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-1 py-0.5 rounded shrink-0 whitespace-nowrap">⏱ ${p.est_time}</span>` : '';
            return `<div class="queue-item ${itemState}" id="queueItem_${p.id}">
                <input type="checkbox" class="queue-checkbox w-3 h-3" data-id="${p.id}" ${_isBatchRendering ? 'disabled' : ''}>
                <span class="flex-1 truncate text-gray-700 dark:text-gray-300 font-medium" title="${displayName}">${displayName}</span>
                ${modeTag}
                ${estTime}
                ${stateIcon}
                <button onclick="loadProjectAndNavigate(${p.id})" class="text-[9px] text-gray-400 hover:text-blue-500 shrink-0" title="이 프로젝트로 이동">→</button>
            </div>`;
        }).join('');
    }

    function toggleSelectAll() {
        const boxes = document.querySelectorAll('.queue-checkbox:not(:disabled)');
        const allChecked = Array.from(boxes).every(b => b.checked);
        boxes.forEach(b => b.checked = !allChecked);
        document.getElementById('selectAllBtn').textContent = allChecked ? '전체 선택' : '전체 해제';
    }

    function getCheckedProjectIds() {
        return Array.from(document.querySelectorAll('.queue-checkbox:checked')).map(b => parseInt(b.dataset.id));
    }

    async function startBatchRender() {
        if (_isBatchRendering) return;
        const ids = getCheckedProjectIds();
        if (ids.length === 0) {
            Utils.showToast('렌더링할 프로젝트를 선택하세요.', 'warning');
            return;
        }

        _isBatchRendering = true;
        const btn = document.getElementById('batchRenderBtn');
        btn.textContent = '⏳ 렌더링 중...';
        btn.disabled = true;

        const resolution = document.getElementById('resolution').value;
        const sub = document.getElementById('useSubtitles').checked;

        // Show progress area
        const progressArea = document.getElementById('batchProgressArea');
        progressArea.classList.remove('hidden');
        document.getElementById('batchProgressCount').textContent = `0/${ids.length}`;
        document.getElementById('batchProgressBar').style.width = '0%';

        let completed = 0;
        for (const pid of ids) {
            // Update item state
            setQueueItemState(pid, 'rendering');
            document.getElementById('batchProgressLabel').textContent = `렌더링 중: 프로젝트 ${pid}`;

            try {
                const res = await fetch(`/api/projects/${pid}/render`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resolution, useSubtitles: sub })
                });
                const data = await res.json();

                if (data.status === 'processing') {
                    // Poll until done
                    await waitForRender(pid);
                    setQueueItemState(pid, 'done');
                } else {
                    setQueueItemState(pid, 'failed');
                }
            } catch (e) {
                setQueueItemState(pid, 'failed');
            }

            completed++;
            document.getElementById('batchProgressCount').textContent = `${completed}/${ids.length}`;
            document.getElementById('batchProgressBar').style.width = `${(completed / ids.length) * 100}%`;
        }

        _isBatchRendering = false;
        btn.textContent = '▶ 선택 렌더링 시작';
        btn.disabled = false;
        document.getElementById('batchProgressLabel').textContent = '완료!';
        Utils.showToast(`${completed}개 프로젝트 렌더링 완료`, 'success');

        // Reload queue after 2s
        setTimeout(loadRenderQueue, 2000);
    }

    async function waitForRender(pid) {
        return new Promise((resolve) => {
            const check = async () => {
                try {
                    const data = await API.project.getFull(pid);
                    if (data.settings?.video_path) return resolve(true);
                    if (data.project?.status === 'failed') return resolve(false);
                } catch (e) { }
                setTimeout(check, 2000);
            };
            check();
        });
    }

    function setQueueItemState(pid, state) {
        const idx = _allQueueItems.findIndex(p => p.id === pid);
        if (idx >= 0) _allQueueItems[idx]._batchState = state;
        const el = document.getElementById(`queueItem_${pid}`);
        if (el) {
            el.className = `queue-item ${state}`;
            const icon = el.querySelector('.animate-spin, .text-green-500, .text-red-500');
            if (icon) icon.remove();
            const newIcon = document.createElement('span');
            if (state === 'rendering') { newIcon.className = 'animate-spin text-blue-500'; newIcon.textContent = '⏳'; }
            else if (state === 'done') { newIcon.className = 'text-green-500'; newIcon.textContent = '✓'; }
            else if (state === 'failed') { newIcon.className = 'text-red-500'; newIcon.textContent = '✗'; }
            const btn = el.querySelector('button');
            if (btn) el.insertBefore(newIcon, btn);
        }
    }

    function loadProjectAndNavigate(pid) {
        if (window.switchProject) window.switchProject(pid);
        else {
            localStorage.setItem('currentProject', pid);
            window.location.reload();
        }
    }

    // Initial load + auto-refresh every 30s
    loadRenderQueue();
    _queueAutoRefreshTimer = setInterval(() => {
        if (!_isBatchRendering) loadRenderQueue();
    }, 30000);
</script>
{% endblock %}
