{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <!-- Bulk Actions -->
    <div id="bulkActions"
        class="hidden flex items-center gap-3 bg-white dark:bg-gray-800 px-4 py-1.5 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
        <span id="selectedCount" class="text-xs font-bold text-gray-700 dark:text-gray-300">0개 선택됨</span>
        <div class="h-4 w-px bg-gray-300 dark:bg-gray-600"></div>
        <button onclick="deleteSelectedProjects()"
            class="text-red-600 hover:text-red-700 text-xs font-bold flex items-center gap-1">
            <span>🗑️</span> 선택 삭제
        </button>
        <div class="h-4 w-px bg-gray-300 dark:bg-gray-600"></div>
        <select id="targetModeSelect" class="text-xs bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded px-1 py-0.5 outline-none">
            <option value="longform">롱폼</option>
            <option value="shorts">쇼츠</option>
            <option value="webtoon">웹툰</option>
            <option value="commerce">커머스</option>
            <option value="blog">블로그</option>
        </select>
        <button onclick="bulkCopyMove('copy')" class="text-blue-600 hover:text-blue-700 text-xs font-bold flex items-center gap-1">
            <span>👯</span> 복사
        </button>
        <button onclick="bulkCopyMove('move')" class="text-amber-600 hover:text-amber-700 text-xs font-bold flex items-center gap-1">
            <span>🚚</span> 이동
        </button>
    </div>

    <button onclick="openProjectModal()" class="btn-primary flex items-center gap-2 ml-auto">
        <span>+</span>
        <span>New Project</span>
    </button>
</div>

<!-- 프로젝트 목록 -->
<div id="loadingSection" class="hidden">
    <div class="card text-center py-12">
        <div class="loader mx-auto mb-4"></div>
        <p class="text-gray-500 dark:text-gray-400">프로젝트를 불러오는 중...</p>
    </div>
</div>

<div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-lg shadow">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-700">
            <tr>
                <th scope="col"
                    class="px-2 py-2 w-10 text-center sticky left-0 z-20 bg-gray-50 dark:bg-gray-700 border-r border-gray-100 dark:border-gray-600">
                    <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)"
                        class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 cursor-pointer">
                </th>
                <th scope="col"
                    class="px-3 py-2 text-left text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap sticky z-10 bg-gray-50 dark:bg-gray-700 border-r border-gray-100 dark:border-gray-600"
                    style="left: 40px;">
                    프로젝트명</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap w-20">
                    시작일</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap w-20">
                    수정일</th>
                <th scope="col"
                    class="px-2 py-2 text-left text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap">
                    주제</th>
                <th scope="col"
                    class="px-2 py-2 text-left text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap max-w-[150px]">
                    영상 제목</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="대본 기획">기획</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="대본 생성">대본</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="이미지 생성">이미지</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="TTS 생성">TTS</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="영상 렌더링">영상</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="썸네일 생성">썸네일</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="설명/태그">설명</th>
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="업로드/예약 완료">{% if is_independent %}업로드{% else %}예약{% endif %}</th>
                {% if is_independent %}
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="발행 완료">발행</th>
                {% endif %}
                <th scope="col"
                    class="px-2 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap">
                    관리</th>
            </tr>
        </thead>
        <tbody id="projectTableBody" class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
            <!-- Rows rendered here -->
        </tbody>
    </table>
</div>

<div id="emptySection" class="card text-center py-12 hidden">
    <div class="text-5xl mb-4">📁</div>
    <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">프로젝트가 없습니다</h3>
    <p class="text-gray-500 mb-6 dark:text-gray-400">첫 번째 프로젝트를 시작해보세요!</p>
    <button onclick="openProjectModal()" class="btn-primary">
        + 새 프로젝트 만들기
    </button>
</div>
{% endblock %}

{% block scripts %}
<script>
    const isIndependent = JSON.parse('{{ is_independent | tojson | safe }}');
    const licenseKey = '{{ get_license_key() }}';

    async function loadProjectList() {
        document.getElementById('loadingSection').classList.remove('hidden');
        document.getElementById('projectTableBody').innerHTML = '';
        document.getElementById('emptySection').classList.add('hidden');

        try {
            // [NEW] Get Current Mode from Settings
            let targetMode = 'longform';
            try {
                const res = await fetch('/api/settings?t=' + new Date().getTime());
                const settings = await res.json();
                targetMode = settings.app_mode || 'longform';
            } catch (e) { console.error("Failed to load settings:", e); }

            console.log("Filtering projects for mode:", targetMode);

            // Force fresh list
            const resProjects = await fetch('/api/projects?t=' + new Date().getTime());
            const data = await resProjects.json();

            if (!data.projects || data.projects.length === 0) {
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('emptySection').classList.remove('hidden');
                document.querySelector('.overflow-x-auto').classList.add('hidden');
                return;
            }

            // [FIX] Filter by App Mode
            // Legacy projects (app_mode is null/undefined) => treat as 'longform'
            const filteredProjects = data.projects.filter(p => {
                let pMode = p.app_mode || 'longform';
                // [ROBUST] If pMode is a language code, fallback
                if (['ko', 'en', 'ja', 'vi', 'es'].includes(pMode)) {
                    pMode = 'longform';
                }
                return pMode === targetMode;
            });

            console.log(`Total: ${data.projects.length}, Filtered (${targetMode}): ${filteredProjects.length}`);

            if (filteredProjects.length === 0) {
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('emptySection').classList.remove('hidden');
                document.querySelector('.overflow-x-auto').classList.add('hidden');

                document.querySelector('#emptySection h3').textContent =
                    targetMode === 'shorts' ? '쇼츠 프로젝트가 없습니다' :
                        targetMode === 'webtoon' ? '웹툰 프로젝트가 없습니다' :
                            targetMode === 'commerce' ? '커머스 쇼츠 프로젝트가 없습니다' : '롱폼 프로젝트가 없습니다';
                return;
            } else {
                document.querySelector('.overflow-x-auto').classList.remove('hidden');
                document.getElementById('emptySection').classList.add('hidden');
            }

            renderProjects(filteredProjects);
            document.getElementById('loadingSection').classList.add('hidden');
        } catch (e) {
            console.error('프로젝트 로드 실패:', e);
            document.getElementById('loadingSection').classList.add('hidden');
            Utils.showToast('목록을 불러오지 못했습니다', 'error');
        }
    }

    function renderProjects(projects) {
        const tbody = document.getElementById('projectTableBody');

        tbody.innerHTML = projects.map(p => {
            const s = p.progress || {};
            // 날짜 포맷 (YY.MM.DD)
            const created = new Date(p.created_at).toLocaleDateString(undefined, { year: '2-digit', month: '2-digit', day: '2-digit' });
            const updated = new Date(p.updated_at).toLocaleDateString(undefined, { year: '2-digit', month: '2-digit', day: '2-digit' });

            // 상태 아이콘 헬퍼
            const checkLink = (isDone, type, pid) => {
                const color = isDone ? 'text-green-500 hover:text-green-600 scale-110' : 'text-gray-300 dark:text-gray-600 hover:text-gray-400';
                const symbol = isDone ? '●' : '○';
                const cursor = isDone ? 'cursor-pointer' : 'cursor-default';
                const clickHandler = isDone ? `onclick="event.stopPropagation(); navigateToStep('${pid}', '${type}')"` : '';

                return `<div class="flex items-center justify-center w-6 h-6 mx-auto rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition ${cursor}" ${clickHandler} title="${type} 페이지로 이동">
                    <span class="${color} text-base font-bold">${symbol}</span>
                </div>`;
            };

            return `
            <tr class="hover:bg-gray-100 dark:hover:bg-gray-700 transition cursor-pointer group" onclick="if(!event.target.closest('input')) selectAndGo('${p.id}')">
                <td class="px-2 py-2 text-center sticky left-0 z-20 bg-white dark:bg-gray-800 border-r border-gray-100 dark:border-gray-700 group-hover:bg-gray-100 dark:group-hover:bg-gray-700" onclick="event.stopPropagation()">
                    <input type="checkbox" name="projectSelect" value="${p.id}" onchange="updateBulkActionState()" 
                        class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 cursor-pointer">
                </td>
                <td class="px-3 py-2 whitespace-nowrap text-[12px] font-medium text-gray-900 dark:text-white sticky z-10 bg-white dark:bg-gray-800 group-hover:bg-gray-100 dark:group-hover:bg-gray-700 border-r dark:border-gray-700"
                    style="left: 40px;"
                    ondblclick="event.stopPropagation(); startInlineEdit(this, '${p.id}', 'name')">
                    <div class="flex items-center gap-1">
                        <span class="text-base">📁</span>
                        <span>${p.name}</span>
                    </div>
                </td>
                <td class="px-1 py-2 whitespace-nowrap text-center text-[11px] text-gray-500 dark:text-gray-400 w-20">${created}</td>
                <td class="px-1 py-2 whitespace-nowrap text-center text-[11px] text-gray-500 dark:text-gray-400 w-20">${updated}</td>
                <td class="px-2 py-2 whitespace-nowrap text-[12px] text-gray-500 dark:text-gray-400 max-w-[120px] truncate" 
                    title="${p.topic || ''}" ondblclick="event.stopPropagation(); startInlineEdit(this, '${p.id}', 'topic')">
                    ${p.topic || '-'}
                </td>
                <td class="px-2 py-2 whitespace-nowrap text-[12px] text-gray-500 dark:text-gray-400 max-w-[150px] truncate" 
                    title="${p.video_title || ''}" ondblclick="event.stopPropagation(); startInlineEdit(this, '${p.id}', 'video_title')">
                    ${p.video_title || '-'}
                </td>
                
                <!-- Steps -->
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.plan, 'script-plan', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.script, 'script-gen', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.image, 'image-gen', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.tts, 'tts', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.video, 'render', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.thumbnail, 'thumbnail', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.desc, 'title-desc', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap relative">
                    ${checkLink(s.upload, 'upload', p.id)}
                    <!-- Auto Upload Rocket Icon (Only if Metadata exists) -->
                    ${s.desc && (s.video || s.upload) ? `
                    <button onclick="event.stopPropagation(); autoUploadYouTube('${p.id}')" 
                        class="absolute -right-2 top-1/2 -translate-y-1/2 text-sm hover:scale-125 transition-transform z-20" 
                        title="${isIndependent ? '유튜브 원클릭 자동 업로드 (영상+메타+썸네일)' : '클라우드 전송 및 업로드 예약 신청'}">
                        🚀
                    </button>` : ''}
                </td>
                ${isIndependent ? `
                <td class="px-1 py-2 text-center whitespace-nowrap relative">
                    ${checkLink(s.publish, 'publish', p.id)}
                    ${s.upload && !s.publish ? `
                    <button onclick="event.stopPropagation(); publicizeVideo('${p.id}')" 
                        class="absolute -right-2 top-1/2 -translate-y-1/2 text-sm hover:scale-125 transition-transform" 
                        title="유튜브 영상을 '공개'로 전환">
                        📢
                    </button>` : ''}
                </td>` : ''}

                <td class="px-2 py-2 whitespace-nowrap text-center text-sm font-medium">
                    <button onclick="event.stopPropagation(); deleteProject('${p.id}')" class="text-red-400 hover:text-red-900 transition p-1 text-xs rounded hover:bg-red-50 dark:hover:bg-red-900/40">
                        🗑️
                    </button>
                </td>
            </tr>
            `;
        }).join('');
    }

    function navigateToStep(projectId, step) {
        console.log(`Navigating to step ${step} for project ${projectId}`);
        setCurrentProject(projectId);
        window.location.href = '/' + step;
    }

    async function selectAndGo(projectId) {
        // [FIX] Single Click: Just Highlight or do nothing? 
        // User requested Double Click -> Select in Sidebar.
        // We will keep single click as "noop" or simple highlight for now, 
        // and let Double Click handle the selection.
        console.log('Single click on project:', projectId);
        // Optional: Add visual highlight logic here if needed
    }

    async function handleProjectDoubleClick(projectId) {
        // [DEPRECATED] Now using inline editing on specific cells.
        // If users still want to select project via double click, we can keep it for OTHER cells or handle it differently.
        console.log('Project double clicked:', projectId);
    }

    // --- Inline Inline Editing ---
    let isEditing = false;

    window.startInlineEdit = function (cell, projectId, field) {
        if (isEditing) return;
        isEditing = true;

        const originalContent = cell.innerHTML;
        const originalValue = cell.innerText.trim();
        const valueToEdit = originalValue === '-' ? '' : originalValue;

        // Create Input
        const input = document.createElement('input');
        input.type = 'text';
        input.value = valueToEdit;
        input.className = 'input-field text-sm py-1 w-full';

        // Match padding/style
        cell.innerHTML = '';
        cell.appendChild(input);
        input.focus();
        input.select();

        const finishEdit = async (save) => {
            const newValue = input.value.trim();
            if (save && newValue !== valueToEdit) {
                try {
                    const data = {};
                    data[field] = newValue;
                    const res = await API.project.update(projectId, data);
                    if (res.status === 'ok') {
                        Utils.showToast('저장되었습니다', 'success');
                        // Update UI
                        if (field === 'name') {
                            cell.innerHTML = `
                                <div class="flex items-center gap-2">
                                    <span class="text-lg">📁</span>
                                    <span>${newValue}</span>
                                </div>
                            `;
                            // Update sidebar if needed
                            if (window.loadProjects) window.loadProjects();
                        } else {
                            cell.innerText = newValue || '-';
                            cell.title = newValue;
                        }
                    } else {
                        throw new Error(res.error || '저장 실패');
                    }
                } catch (e) {
                    Utils.showToast(e.message, 'error');
                    cell.innerHTML = originalContent;
                }
            } else {
                cell.innerHTML = originalContent;
            }
            isEditing = false;
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') finishEdit(true);
            if (e.key === 'Escape') finishEdit(false);
        });

        input.addEventListener('blur', () => {
            finishEdit(true);
        });
    };

    async function deleteProject(projectId) {
        if (!confirm('정말 이 프로젝트를 삭제하시겠습니까? 복구할 수 없습니다.')) return;

        try {
            await API.project.delete(projectId);
            Utils.showToast('삭제되었습니다', 'success');
            loadProjectList();
            // 사이드바 목록도 갱신
            if (window.loadProjects) window.loadProjects();
        } catch (e) {
            Utils.showToast('삭제 실패', 'error');
        }
    }

    async function autoUploadYouTube(projectId) {
        const rocketBtn = event.currentTarget;
        const originalText = rocketBtn.innerText;

        if (isIndependent) {
            if (!confirm('유튜브에 영상을 자동으로 업로드하고 썸네일/메타데이터를 설정하시겠습니까?')) return;
            try {
                rocketBtn.innerText = '⏳';
                rocketBtn.disabled = true;
                Utils.showToast('유튜브 업로드를 시작합니다...', 'info');

                const res = await fetch(`/api/youtube/upload-external/${projectId}`, { method: 'POST' });
                const data = await res.json();

                if (res.ok && data.status === 'ok') {
                    Utils.showToast('유튜브 업로드 및 설정 완료!', 'success');
                    loadProjectList();
                } else throw new Error(data.error || '업로드 실패');
            } catch (e) {
                Utils.showToast(`업로드 실패: ${e.message}`, 'error');
            } finally {
                rocketBtn.innerText = originalText;
                rocketBtn.disabled = false;
            }
        } else {
            // [STANDARD USER] Direct YouTube Private Upload + Admin Record
            if (!confirm('유튜브 채널 (@Honjada)에 "비공개"로 예약 업로드하고 검토를 요청하시겠습니까?')) return;
            try {
                rocketBtn.innerText = '⏳';
                rocketBtn.disabled = true;
                Utils.showToast('유튜브 예약 업로드 중...', 'info');

                // 1. YouTube Upload
                const ytRes = await fetch(`/api/youtube/upload-external/${projectId}`, { method: 'POST' });
                const ytData = await ytRes.json();
                if (ytRes.status !== 200 || ytData.status !== 'ok') throw new Error(ytData.error || "유튜브 업로드 실패");

                // 2. Submit record to Central Server
                const fullData = await API.project.get(projectId);
                const settings = await API.project.getSettings(projectId);

                const payload = {
                    userId: licenseKey,
                    videoUrl: ytData.url,
                    videoId: ytData.video_id,
                    metadata: {
                        title: settings.title || fullData.name,
                        projectId: projectId,
                        isYouTubePrivate: true
                    }
                };

                const pubRes = await fetch('{{ AUTH_SERVER_URL }}/api/publishing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const pubData = await pubRes.json();
                if (pubData.success) {
                    Utils.showToast("성공! 유튜브 채널에 비공개로 업로드되었으며 검토 요청이 완료되었습니다.", 'success');
                    loadProjectList();
                } else throw new Error(pubData.error || "중앙 서버 기록 실패");
            } catch (e) {
                console.error('발행 요청 실패:', e);
                Utils.showToast(`오류: ${e.message}`, 'error');
            } finally {
                rocketBtn.innerText = originalText;
                rocketBtn.disabled = false;
            }
        }
    }

    async function publicizeVideo(projectId) {
        if (!confirm('유튜브 영상을 "공개" 상태로 전환하시겠습니까?\n모든 사람이 영상을 볼 수 있게 됩니다.')) return;

        try {
            Utils.showToast('공개 상태로 전환 중...', 'info');
            const res = await fetch(`/api/projects/${projectId}/youtube/public`, {
                method: 'POST'
            });
            const data = await res.json();

            if (res.ok && data.status === 'ok') {
                Utils.showToast('성공적으로 공개 전환되었습니다!', 'success');
                loadProjectList();
            } else {
                throw new Error(data.detail || '전환 실패');
            }
        } catch (e) {
            console.error('공개 전환 실패:', e);
            Utils.showToast(`오류 발생: ${e.message}`, 'error');
        }
    }

    // [NEW] Bulk Actions Logic
    function toggleSelectAll(source) {
        const checkboxes = document.getElementsByName('projectSelect');
        for (let cb of checkboxes) {
            cb.checked = source.checked;
        }
        updateBulkActionState();
    }

    function updateBulkActionState() {
        const checkboxes = document.getElementsByName('projectSelect');
        const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
        const bulkActions = document.getElementById('bulkActions');
        const selectedCountSpan = document.getElementById('selectedCount');
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');

        if (checkedCount > 0) {
            bulkActions.classList.remove('hidden');
            selectedCountSpan.textContent = `${checkedCount}개 선택됨`;
        } else {
            bulkActions.classList.add('hidden');
        }

        // Update Select All Checkbox state
        if (checkboxes.length > 0 && checkedCount === checkboxes.length) {
            selectAllCheckbox.checked = true;
            selectAllCheckbox.indeterminate = false;
        } else if (checkedCount > 0) {
            selectAllCheckbox.checked = false;
            selectAllCheckbox.indeterminate = true;
        } else {
            selectAllCheckbox.checked = false;
            selectAllCheckbox.indeterminate = false;
        }
    }

    async function deleteSelectedProjects() {
        const checkboxes = document.getElementsByName('projectSelect');
        const selectedIds = Array.from(checkboxes).filter(cb => cb.checked).map(cb => parseInt(cb.value));

        if (selectedIds.length === 0) return;

        if (!confirm(`선택한 ${selectedIds.length}개의 프로젝트를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;

        try {
            // Bulk Delete API Call
            const res = await fetch('/api/projects/bulk-delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: selectedIds })
            });

            const data = await res.json();

            if (res.ok && data.status === 'success') {
                Utils.showToast(`${data.deleted_count}개 프로젝트 삭제 완료`, 'success');
                // Reset Selection
                document.getElementById('selectAllCheckbox').checked = false;
                document.getElementById('selectAllCheckbox').indeterminate = false;
                document.getElementById('bulkActions').classList.add('hidden');

                loadProjectList();
                // Sidebar refresh
                if (window.loadProjects) window.loadProjects();
            } else {
                throw new Error(data.detail || '삭제 실패');
            }
        } catch (e) {
            console.error('Bulk delete error:', e);
            Utils.showToast(`삭제 중 오류 발생: ${e.message}`, 'error');
        }
    }

    async function bulkCopyMove(action) {
        const checkboxes = document.getElementsByName('projectSelect');
        const selectedIds = Array.from(checkboxes).filter(cb => cb.checked).map(cb => parseInt(cb.value));
        const targetMode = document.getElementById('targetModeSelect').value;

        if (selectedIds.length === 0) return;

        const actionText = action === 'copy' ? '복사' : '이동';
        const targetModeText = {
            'longform': '롱폼',
            'shorts': '쇼츠',
            'webtoon': '웹툰',
            'commerce': '커머스',
            'blog': '블로그'
        }[targetMode];

        if (!confirm(`선택한 ${selectedIds.length}개의 프로젝트를 [${targetModeText}] 모드로 ${actionText}하시겠습니까?`)) return;

        try {
            Utils.showToast(`${actionText} 중...`, 'info');
            const res = await fetch('/api/projects/bulk-copy-move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    ids: selectedIds,
                    target_mode: targetMode,
                    action: action
                })
            });

            const data = await res.json();

            if (res.ok && data.status === 'success') {
                Utils.showToast(`${data.processed_count}개 프로젝트 ${actionText} 완료`, 'success');
                // Reset Selection
                document.getElementById('selectAllCheckbox').checked = false;
                document.getElementById('selectAllCheckbox').indeterminate = false;
                document.getElementById('bulkActions').classList.add('hidden');

                loadProjectList();
                // Sidebar refresh
                if (window.loadProjects) window.loadProjects();
            } else {
                throw new Error(data.detail || `${actionText} 실패`);
            }
        } catch (e) {
            console.error(`${action} error:`, e);
            Utils.showToast(`오류 발생: ${e.message}`, 'error');
        }
    }

    document.addEventListener('DOMContentLoaded', loadProjectList);
</script>
{% endblock %}
