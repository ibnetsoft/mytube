{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6 pr-56">
    <!-- Bulk Actions -->
    <div id="bulkActions"
        class="hidden flex items-center gap-3 bg-[#1c2027] px-4 py-1.5 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
        <span id="selectedCount" class="text-xs font-bold text-gray-700 dark:text-gray-300">0 {{ t('selected_count_suffix') }}</span>
        <div class="h-4 w-px bg-gray-300 dark:bg-gray-600"></div>
        <button onclick="deleteSelectedProjects()" class="text-white hover:bg-red-900/20 px-3 py-1 rounded border border-red-900/30 text-xs font-bold">
            {{ t('btn_delete_selected') }}
        </button>
        <div class="h-4 w-px bg-gray-300 dark:bg-gray-600"></div>
        <select id="targetModeSelect" class="text-xs bg-[#1c2027]/50 border border-gray-200 dark:border-gray-600 rounded px-1 py-0.5 outline-none bg-[#1c2027] text-white">
            <option value="longform">{{ t('mode_longform') }}</option>
            <option value="longform_music">{{ t('mode_longform_music') }}</option>
            <option value="shorts">{{ t('mode_shorts') }}</option>
            <option value="webtoon">{{ t('mode_webtoon') }}</option>
            <option value="commerce">{{ t('mode_commerce') }}</option>
            <option value="blog">{{ t('mode_blog') }}</option>
        </select>
        <button onclick="bulkCopyMove('copy')" class="text-white hover:bg-blue-900/20 px-3 py-1 rounded border border-blue-900/30 text-xs font-bold">
            {{ t('btn_copy') }}
        </button>
        <button onclick="bulkCopyMove('move')" class="text-white hover:bg-amber-900/20 px-3 py-1 rounded border border-amber-900/30 text-xs font-bold">
            {{ t('btn_move') }}
        </button>
    </div>

    <div class="flex items-center gap-4 ml-auto">
        <!-- Pagination & Sorting Controls -->
        <div class="flex items-center gap-2 bg-[#1c2027] px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm">
            <select id="sortOrder" onchange="changeSort(this.value)" class="text-[11px] bg-transparent border-none outline-none font-bold text-gray-600 dark:text-gray-400 cursor-pointer bg-[#1c2027] text-white">
                <option value="newest">{{ t('sort_newest') }}</option>
                <option value="oldest">{{ t('sort_oldest') }}</option>
                <option value="name">{{ t('sort_name') }}</option>
            </select>
            <div class="h-3 w-px bg-gray-300 dark:bg-gray-600"></div>
            <select id="pageSize" onchange="changePageSize(this.value)" class="text-[11px] bg-transparent border-none outline-none font-bold text-gray-600 dark:text-gray-400 cursor-pointer bg-[#1c2027] text-white">
                <option value="20">20{{ t('rows_suffix') }}</option>
                <option value="50">50{{ t('rows_suffix') }}</option>
                <option value="100">100{{ t('rows_suffix') }}</option>
            </select>
        </div>

        <!-- 오늘의 주제 가져오기 -->
        <button onclick="fetchDailyTopic()" class="relative group overflow-hidden px-4 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-extrabold text-xs shadow-lg shadow-blue-500/25 transition-all duration-300 hover:shadow-indigo-500/35 hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center gap-1.5 border border-blue-400/20">
            <span class="relative z-10">{{ t('btn_get_daily_topic') }}</span>
            <span class="text-sm group-hover:translate-x-0.5 transition-transform duration-300">⚡</span>
        </button>

        <button onclick="openProjectModal()" class="px-4 py-2 rounded-xl text-xs font-bold border border-gray-200 dark:border-gray-600 bg-transparent hover:bg-[#0a0f1d] text-white transition-all">
            {{ t('btn_new_project') }}
        </button>
    </div>
</div>

<!-- ?꾨줈?앺듃 紐⑸줉 -->
<div id="loadingSection" class="hidden">
    <div class="card text-center py-12">
        <div class="loader mx-auto mb-4"></div>
        <p class="text-gray-500 dark:text-gray-400">{{ t('status_loading_projects') }}</p>
    </div>
</div>

<div class="overflow-x-auto bg-[#1c2027] rounded-3xl shadow-2xl border border-gray-700 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-[#1c2027]/50">
            <tr id="projectTableHeadRow"></tr>
        </thead>
        <tbody id="projectTableBody" class="bg-[#1c2027] divide-y divide-gray-200 dark:divide-gray-700">
            <!-- Rows rendered here -->
        </tbody>
    </table>
</div>

<!-- Pagination Bottom -->
<div id="paginationContainer" class="mt-4 flex items-center justify-between px-4 py-3 bg-[#1c2027] rounded-lg shadow border border-gray-100 dark:border-gray-700">
    <div class="text-xs text-gray-500 dark:text-gray-400">
        {{ t('total') }} <span id="totalItemsCount" class="font-bold text-blue-500">0</span> {{ t('items') }}
    </div>
    <div class="flex items-center gap-2">
        <button id="prevBtn" onclick="changePage(-1)" class="px-3 py-1.5 rounded-lg border border-gray-600 hover:bg-[#0a0f1d] text-xs font-bold text-white disabled:opacity-30 disabled:cursor-not-allowed transition-all">
            {{ t('btn_prev') }}
        </button>
        <div id="pageNumbers" class="flex gap-1">
            <!-- Page numbers -->
        </div>
        <button id="nextBtn" onclick="changePage(1)" class="px-3 py-1.5 rounded-lg border border-gray-600 hover:bg-[#0a0f1d] text-xs font-bold text-white disabled:opacity-30 disabled:cursor-not-allowed transition-all">
            {{ t('btn_next') }}
        </button>
    </div>
</div>

<div id="emptySection" class="card text-center py-12 hidden">
    <div class="text-5xl mb-4">?뱚</div>
    <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">{{ t('no_projects_title') }}</h3>
    <p class="text-gray-500 mb-6 dark:text-gray-400">{{ t('no_projects_desc') }}</p>
    <button onclick="openProjectModal()" class="btn-primary">
        + {{ t('btn_new_project') }}
    </button>
</div>
{% endblock %}

{% block scripts %}
<script>
    const isIndependent = JSON.parse('{{ is_independent | tojson | safe }}');
    const licenseKey = '{{ get_license_key() }}';

    // i18n for JS (var ?ъ슜 - base.html??var i18n怨??꾩뿭 異⑸룎 諛⑹?)
    var i18n = {
        title_go_to: "{{ t('title_go_to') }}",
        title_page: "{{ t('title_page') }}",
        no_shorts_projects: "{{ t('no_shorts_projects') }}",
        no_webtoon_projects: "{{ t('no_webtoon_projects') }}",
        no_commerce_projects: "{{ t('no_commerce_projects') }}",
        no_longform_projects: "{{ t('no_longform_projects') }}",
        status_failed_load_projects: "{{ t('status_failed_load_projects') }}",
        status_failed_fetch_list: "{{ t('status_failed_fetch_list') }}",
        status_saved: "{{ t('status_saved') }}",
        status_failed_save: "{{ t('status_failed_save') }}",
        confirm_delete_project_permanent: "{{ t('confirm_delete_project_permanent') }}",
        status_deleted: "{{ t('status_deleted') }}",
        status_failed_delete: "{{ t('status_failed_delete') }}",
        confirm_yt_auto_upload: "{{ t('confirm_yt_auto_upload') }}",
        status_yt_upload_start: "{{ t('status_yt_upload_start') }}",
        status_yt_upload_done: "{{ t('status_yt_upload_done') }}",
        status_failed_upload: "{{ t('status_failed_upload') }}",
        confirm_yt_cloud_reserve: "{{ t('confirm_yt_cloud_reserve') }}",
        status_yt_reserving: "{{ t('status_yt_reserving') }}",
        status_failed_yt_upload: "{{ t('status_failed_yt_upload') }}",
        status_yt_cloud_done: "{{ t('status_yt_cloud_done') }}",
        status_failed_central_record: "{{ t('status_failed_central_record') }}",
        confirm_yt_public: "{{ t('confirm_yt_public') }}",
        status_yt_publicizing: "{{ t('status_yt_publicizing') }}",
        status_yt_publicized: "{{ t('status_yt_publicized') }}",
        status_failed_conversion: "{{ t('status_failed_conversion') }}",
        selected_count_suffix: "{{ t('selected_count_suffix') }}",
        confirm_bulk_delete_prefix: "{{ t('confirm_bulk_delete_prefix') }}",
        confirm_bulk_delete_suffix: "{{ t('confirm_bulk_delete_suffix') }}",
        warn_irreversible: "{{ t('warn_irreversible') }}",
        status_bulk_deleted_done: "{{ t('status_bulk_deleted_done') }}",
        confirm_bulk_copy_move_prefix: "{{ t('confirm_bulk_copy_move_prefix') }}",
        confirm_bulk_copy_move_mid: "{{ t('confirm_bulk_copy_move_mid') }}",
        confirm_bulk_copy_move_suffix: "{{ t('confirm_bulk_copy_move_suffix') }}",
        confirm_bulk_copy_move_end: "{{ t('confirm_bulk_copy_move_end') }}",
        status_in_progress_suffix: "{{ t('status_in_progress_suffix') }}",
        status_bulk_action_prefix: "{{ t('status_bulk_action_prefix') }}",
        status_done: "{{ t('status_done') }}",
        title_yt_rocket_independent: "{{ t('title_yt_rocket_independent') }}",
        title_yt_rocket_cloud: "{{ t('title_yt_rocket_cloud') }}",
        err_upload_failed_msg: "{{ t('err_upload_failed_msg') }}",
        err_publish_failed: "{{ t('err_publish_failed') }}",
        err_public_switch_failed: "{{ t('err_public_switch_failed') }}",
        err_delete_failed_msg: "{{ t('err_delete_failed_msg') }}",
        err_action_failed_suffix: "{{ t('err_action_failed_suffix') }}",
        err_generic_msg: "{{ t('err_generic_msg') }}",
        sort_newest: "{{ t('sort_newest') }}",
        sort_oldest: "{{ t('sort_oldest') }}",
        sort_name: "{{ t('sort_name') }}"
    };

    // State for Pagination & Sorting
    let allFilteredProjects = [];
    let currentPage = 1;
    let pageSize = 20;
    let currentSort = 'newest';
    let currentDisplayMode = 'longform';

    function renderProjectTableHeader() {
        const head = document.getElementById('projectTableHeadRow');
        const isMusicMode = currentDisplayMode === 'longform_music';
        const statusColumns = isMusicMode ? [
            '음악기획',
            '커버',
            '트랙',
            '썸네일',
            '렌더링',
            '설명',
            '전송',
        ] : [
            `{{ t('th_plan') }}`,
            `{{ t('th_script') }}`,
            `{{ t('th_image') }}`,
            `{{ t('th_tts') }}`,
            `{{ t('th_video') }}`,
            `{{ t('th_thumbnail') }}`,
            `{{ t('th_desc') }}`,
            `{% if is_independent %}{{ t('th_upload') }}{% else %}{{ t('th_publish') }}{% endif %}`,
            ...(isIndependent ? [`{{ t('th_publish') }}`] : []),
        ];

        head.innerHTML = `
            <th scope="col"
                class="px-2 py-2 w-10 text-center sticky left-0 z-20 bg-[#1c2027]/50 border-r border-gray-100 dark:border-gray-600">
                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)"
                    class="w-4 h-4 text-blue-600 bg-[#1c2027] border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 bg-[#1c2027]/50 dark:border-gray-600 cursor-pointer">
            </th>
            <th scope="col"
                class="px-3 py-2 text-left text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap sticky z-10 bg-[#1c2027]/50 border-r border-white/5 max-w-[140px] truncate"
                style="left: 40px;">
                {{ t('th_project_name') }}
            </th>
            <th scope="col"
                class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap w-20">
                {{ t('th_start_date') }}
            </th>
            <th scope="col"
                class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap w-20">
                {{ t('th_edit_date') }}
            </th>
            <th scope="col"
                class="px-2 py-2 text-left text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap">
                다음 작업
            </th>
            <th scope="col"
                class="px-2 py-2 text-left text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap max-w-[150px]">
                ${isMusicMode ? '음악 제목' : `{{ t('th_video_title') }}`}
            </th>
            ${statusColumns.map(label => `
                <th scope="col"
                    class="px-1 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap"
                    title="${label}">${label}</th>
            `).join('')}
            <th scope="col"
                class="px-2 py-2 text-center text-[11px] font-medium text-gray-500 dark:text-gray-300 tracking-wider whitespace-nowrap">
                {{ t('th_manage') }}
            </th>
        `;
    }

    async function loadProjectList() {
        document.getElementById('loadingSection').classList.remove('hidden');
        document.getElementById('projectTableBody').innerHTML = '';
        document.getElementById('emptySection').classList.add('hidden');

        try {
            // [NEW] Get Current Mode from Settings
            let targetMode = 'longform';
            try {
                const res = await fetch('/api/settings?t=' + new Date().getTime());
                const settings = await res.json();
                targetMode = settings.app_mode || 'longform';
            } catch (e) { console.error("Failed to load settings:", e); }

            currentDisplayMode = targetMode;
            renderProjectTableHeader();

            console.log("Filtering projects for mode:", targetMode);

            // Force fresh list
            const resProjects = await fetch('/api/projects?t=' + new Date().getTime());
            const data = await resProjects.json();

            if (!data.projects || data.projects.length === 0) {
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('emptySection').classList.remove('hidden');
                document.querySelector('.overflow-x-auto').classList.add('hidden');
                return;
            }

            // [FIX] Filter by App Mode
            // Legacy projects (app_mode is null/undefined) => treat as 'longform'
            const filteredProjects = data.projects.filter(p => {
                let pMode = p.app_mode || 'longform';
                // [ROBUST] If pMode is a language code, fallback
                if (['ko', 'en', 'ja', 'vi', 'es'].includes(pMode)) {
                    pMode = 'longform';
                }
                return pMode === targetMode;
            });

            console.log(`Total: ${data.projects.length}, Filtered (${targetMode}): ${filteredProjects.length}`);

            if (filteredProjects.length === 0) {
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('emptySection').classList.remove('hidden');
                document.querySelector('.overflow-x-auto').classList.add('hidden');

                document.querySelector('#emptySection h3').textContent =
                    targetMode === 'shorts' ? `${i18n.no_shorts_projects}` :
                        targetMode === 'webtoon' ? `${i18n.no_webtoon_projects}` :
                            targetMode === 'commerce' ? `${i18n.no_commerce_projects}` : `${i18n.no_longform_projects}`;
                return;
            } else {
                document.querySelector('.overflow-x-auto').classList.remove('hidden');
                document.getElementById('emptySection').classList.add('hidden');
            }

            allFilteredProjects = filteredProjects;
            currentPage = 1;
            applyFiltersAndRender();

            document.getElementById('loadingSection').classList.add('hidden');
        } catch (e) {
            console.error(`${i18n.status_failed_load_projects}:`, e);
            document.getElementById('loadingSection').classList.add('hidden');
            Utils.showToast(`${i18n.status_failed_fetch_list}`, 'error');
        }
    }

    function changeSort(val) {
        currentSort = val;
        currentPage = 1;
        applyFiltersAndRender();
    }

    function changePageSize(val) {
        pageSize = parseInt(val);
        currentPage = 1;
        applyFiltersAndRender();
    }

    function changePage(delta) {
        currentPage += delta;
        applyFiltersAndRender();
    }

    function goToPage(page) {
        currentPage = page;
        applyFiltersAndRender();
    }

    function applyFiltersAndRender() {
        // 1. Sort
        const sorted = [...allFilteredProjects].sort((a, b) => {
            if (currentSort === 'newest') return new Date(b.created_at) - new Date(a.created_at);
            if (currentSort === 'oldest') return new Date(a.created_at) - new Date(b.created_at);
            if (currentSort === 'name') return a.name.localeCompare(b.name);
            return 0;
        });

        // 2. Paginate
        const totalItems = sorted.length;
        const totalPages = Math.ceil(totalItems / pageSize);
        
        // Ensure currentPage is within bounds
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;

        const startIdx = (currentPage - 1) * pageSize;
        const endIdx = startIdx + pageSize;
        const pageData = sorted.slice(startIdx, endIdx);

        // 3. Render Table
        renderProjects(pageData);

        // 4. Update UI
        document.getElementById('totalItemsCount').textContent = totalItems;
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages || totalPages === 0;

        // Render Page Numbers
        const pageNumbersEl = document.getElementById('pageNumbers');
        pageNumbersEl.innerHTML = '';
        
        // Simple pagination logic: show current, prev, next if exists
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.onclick = () => goToPage(i);
            btn.className = `w-8 h-8 rounded-lg text-xs font-bold transition-all ${i === currentPage ? 'bg-blue-600 text-white shadow-md' : 'text-gray-500 hover:bg-[#0a0f1d] dark:hover:bg-[#0a0f1d]'}`;
            pageNumbersEl.appendChild(btn);
        }

        if (totalItems === 0) {
            document.querySelector('.overflow-x-auto').classList.add('hidden');
            document.getElementById('emptySection').classList.remove('hidden');
            document.getElementById('paginationContainer').classList.add('hidden');
        } else {
            document.querySelector('.overflow-x-auto').classList.remove('hidden');
            document.getElementById('emptySection').classList.add('hidden');
            document.getElementById('paginationContainer').classList.remove('hidden');
        }
    }

    function renderProjects(projects) {
        const tbody = document.getElementById('projectTableBody');
        const isMusicMode = currentDisplayMode === 'longform_music';

        tbody.innerHTML = projects.map(p => {
            const s = p.progress || {};
            const planStep = p.app_mode === 'longform_music' ? 'music-plan' : 'script-plan';
            const created = new Date(p.created_at).toLocaleDateString(undefined, { year: '2-digit', month: '2-digit', day: '2-digit' });
            const updated = new Date(p.updated_at).toLocaleDateString(undefined, { year: '2-digit', month: '2-digit', day: '2-digit' });

            const checkLink = (isDone, type, pid) => {
                const color = isDone ? 'text-green-500 hover:text-green-600 scale-110' : 'text-gray-300 dark:text-gray-600 hover:text-gray-400';
                const symbol = isDone ? '●' : '○';
                const cursor = isDone ? 'cursor-pointer' : 'cursor-default';
                const clickHandler = isDone ? `onclick="event.stopPropagation(); navigateToStep('${pid}', '${type}')"` : '';

                return `<div class="flex items-center justify-center w-6 h-6 mx-auto rounded-full hover:bg-[#0a0f1d] dark:hover:bg-[#0a0f1d] transition ${cursor}" ${clickHandler} title="${i18n.title_go_to} ${type} ${i18n.title_page}">
                    <span class="${color} text-base font-bold">${symbol}</span>
                </div>`;
            };

            const musicStatusCells = `
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.music_plan, 'music-plan', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.music_cover, 'image-gen', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.music_tracks, 'audio-gen', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.music_thumbnail, 'thumbnail', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.music_render, 'render', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.music_desc, 'title-desc', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.music_publish, 'render', p.id)}</td>
            `;

            const defaultStatusCells = `
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.plan, planStep, p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.script, 'script-gen', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.image, 'image-gen', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.tts, 'tts', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.video, 'render', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.thumbnail, 'thumbnail', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap">${checkLink(s.desc, 'title-desc', p.id)}</td>
                <td class="px-1 py-2 text-center whitespace-nowrap relative">
                    ${checkLink(s.upload, 'upload', p.id)}
                </td>
                ${isIndependent ? `
                <td class="px-1 py-2 text-center whitespace-nowrap relative">
                    ${checkLink(s.publish, 'publish', p.id)}
                </td>` : ''}
            `;

            const manageCell = isMusicMode ? `
                <div class="flex items-center justify-center gap-1">
                    <button onclick="event.stopPropagation(); navigateToStep('${p.id}', 'render')"
                        class="px-2 py-1 rounded border border-blue-900/30 text-[11px] font-bold text-blue-300 hover:bg-[#0a0f1d] transition">
                        ${s.music_render ? '상태 확인' : '렌더링'}
                    </button>
                    <button onclick="event.stopPropagation(); deleteProject('${p.id}')" class="text-red-400 hover:text-red-300 transition p-1 text-xs rounded hover:bg-[#0a0f1d] dark:hover:bg-red-900/40">
                        삭제
                    </button>
                </div>
            ` : `
                <button onclick="event.stopPropagation(); deleteProject('${p.id}')" class="text-red-400 hover:text-red-900 transition p-1 text-xs rounded hover:bg-[#0a0f1d] dark:hover:bg-red-900/40">
                    삭제
                </button>
            `;

            return `
            <tr class="hover:bg-[#0a0f1d] dark:hover:bg-[#0a0f1d] transition cursor-pointer group" onclick="if(!event.target.closest('input')) selectAndGo('${p.id}')">
                <td class="px-2 py-2 text-center sticky left-0 z-20 bg-[#1c2027] border-r border-white/5 group-hover:bg-[#0a0f1d]" onclick="event.stopPropagation()">
                    <input type="checkbox" name="projectSelect" value="${p.id}" onchange="updateBulkActionState()" 
                        class="w-4 h-4 text-blue-600 bg-[#1c2027] border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 bg-[#1c2027]/50 dark:border-gray-600 cursor-pointer">
                </td>
                <td class="px-3 py-2 whitespace-nowrap text-[12px] font-medium text-gray-900 dark:text-white sticky z-10 bg-[#1c2027] group-hover:bg-[#0a0f1d] border-r border-white/5 max-w-[140px] truncate"
                    style="left: 40px;"
                    ondblclick="event.stopPropagation(); startInlineEdit(this, '${p.id}', 'name')">
                    <div class="flex items-center gap-1">
                        <span class="text-base">📁</span>
                        <div class="flex flex-col min-w-0">
                            <span class="truncate">${p.name}</span>
                            ${p.name_vi && window.currentLang === 'vi' ? `<span class="text-[10px] text-purple-400 font-semibold truncate" title="${p.name_vi}">${p.name_vi}</span>` : ''}
                        </div>
                    </div>
                </td>
                <td class="px-1 py-2 whitespace-nowrap text-center text-[11px] text-gray-500 dark:text-gray-400 w-20">${created}</td>
                <td class="px-1 py-2 whitespace-nowrap text-center text-[11px] text-gray-500 dark:text-gray-400 w-20">${updated}</td>
                <td class="px-2 py-2 whitespace-nowrap text-[12px] text-gray-500 dark:text-gray-400 max-w-[140px]">
                    ${renderNextActionCell(p)}
                </td>
                <td class="px-2 py-2 whitespace-nowrap text-[12px] text-gray-500 dark:text-gray-400 max-w-[150px] truncate" 
                    title="${p.video_title || ''}" ondblclick="event.stopPropagation(); startInlineEdit(this, '${p.id}', 'video_title')">
                    <div class="flex flex-col min-w-0">
                        <span class="truncate">${p.video_title || '-'}</span>
                        ${p.video_title_vi && window.currentLang === 'vi' ? `<span class="text-[10px] text-purple-400 font-semibold truncate" title="${p.video_title_vi}">${p.video_title_vi}</span>` : ''}
                    </div>
                </td>
                ${isMusicMode ? musicStatusCells : defaultStatusCells}
                <td class="px-2 py-2 whitespace-nowrap text-center text-sm font-medium">
                    ${manageCell}
                </td>
            </tr>
            `;
        }).join('');
    }

    function getStepRoute(step) {
        const routeMap = {
            'music-plan': '/music-plan',
            'script-plan': '/script-plan',
            'script-gen': '/script-gen',
            'image-gen': '/image-gen',
            'image-crop': '/image-crop',
            'audio-gen': '/audio-gen',
            'tts': '/tts',
            'thumbnail': '/thumbnail',
            'render': '/render',
            'title-desc': '/title-desc',
            'upload': '/video-upload',
            'publish': '/video-upload',
        };
        return routeMap[step] || `/${step}`;
    }

    function navigateToStep(projectId, step) {
        console.log(`Navigating to step ${step} for project ${projectId}`);
        setCurrentProject(projectId);
        window.location.href = getStepRoute(step);
    }

    function getNextAction(project) {
        const s = project.progress || {};
        const isMusic = project.app_mode === 'longform_music' || currentDisplayMode === 'longform_music';
        const steps = isMusic ? [
            { key: 'music_plan', label: '음악 기획', route: 'music-plan' },
            { key: 'music_cover', label: '커버 이미지', route: 'image-gen' },
            { key: 'music_tracks', label: '트랙 생성', route: 'audio-gen' },
            { key: 'music_thumbnail', label: '썸네일', route: 'thumbnail' },
            { key: 'music_render', label: '영상 렌더링', route: 'render' },
            { key: 'music_desc', label: '제목/설명', route: 'title-desc' },
            { key: 'music_publish', label: '발행 준비', route: 'render' },
        ] : [
            { key: 'plan', label: '기획', route: project.app_mode === 'longform_music' ? 'music-plan' : 'script-plan' },
            { key: 'script', label: '대본', route: 'script-gen' },
            { key: 'image', label: '이미지', route: 'image-gen' },
            { key: 'tts', label: 'TTS', route: 'tts' },
            { key: 'video', label: '영상', route: 'render' },
            { key: 'thumbnail', label: '썸네일', route: 'thumbnail' },
            { key: 'desc', label: '설명', route: 'title-desc' },
            { key: 'upload', label: '발행대기 등록', route: 'upload' },
            ...(isIndependent ? [{ key: 'publish', label: '웹어드민 발행', route: 'upload' }] : []),
        ];

        const next = steps.find(step => !s[step.key]);
        if (!next) {
            return { label: '완료', route: isMusic ? 'render' : 'upload', done: true };
        }
        return { ...next, done: false };
    }

    function renderNextActionCell(project) {
        const action = getNextAction(project);
        const doneClass = action.done
            ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-300'
            : 'border-blue-500/30 bg-blue-500/10 text-blue-200 hover:bg-blue-500/20';
        return `
            <button onclick="event.stopPropagation(); navigateToStep('${project.id}', '${action.route}')"
                class="max-w-[130px] px-2 py-1 rounded-md border text-[11px] font-bold truncate transition ${doneClass}"
                title="${action.label}">
                ${action.label}
            </button>
        `;
    }

    async function selectAndGo(projectId) {
        setCurrentProject(projectId);
        const select = document.getElementById('projectSelect');
        if (select) select.value = projectId;
        if (typeof onProjectChange === 'function') {
            await onProjectChange(projectId);
        }
    }

    async function handleProjectDoubleClick(projectId) {
        // [DEPRECATED] Now using inline editing on specific cells.
        // If users still want to select project via double click, we can keep it for OTHER cells or handle it differently.
        console.log('Project double clicked:', projectId);
    }

    // --- Inline Inline Editing ---
    let isEditing = false;

    window.startInlineEdit = function (cell, projectId, field) {
        if (isEditing) return;
        isEditing = true;

        const originalContent = cell.innerHTML;
        const originalValue = cell.innerText.trim();
        const valueToEdit = originalValue === '-' ? '' : originalValue;

        // Create Input
        const input = document.createElement('input');
        input.type = 'text';
        input.value = valueToEdit;
        input.className = 'input-field text-sm py-1 w-full';

        // Match padding/style
        cell.innerHTML = '';
        cell.appendChild(input);
        input.focus();
        input.select();

        const finishEdit = async (save) => {
            const newValue = input.value.trim();
            if (save && newValue !== valueToEdit) {
                try {
                    const data = {};
                    data[field] = newValue;
                    const res = await API.project.update(projectId, data);
                    if (res.status === 'ok') {
                        Utils.showToast(`${i18n.status_saved}`, 'success');
                        // Update UI
                        if (field === 'name') {
                            cell.innerHTML = `
                                <div class="flex items-center gap-2">
                                    <span class="text-lg">?뱚</span>
                                    <span>${newValue}</span>
                                </div>
                            `;
                            // Update sidebar if needed
                            if (window.loadProjects) window.loadProjects();
                        } else {
                            cell.innerText = newValue || '-';
                            cell.title = newValue;
                        }
                    } else {
                        throw new Error(res.error || `${i18n.status_failed_save}`);
                    }
                } catch (e) {
                    Utils.showToast(e.message, 'error');
                    cell.innerHTML = originalContent;
                }
            } else {
                cell.innerHTML = originalContent;
            }
            isEditing = false;
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') finishEdit(true);
            if (e.key === 'Escape') finishEdit(false);
        });

        input.addEventListener('blur', () => {
            finishEdit(true);
        });
    };

    async function deleteProject(projectId) {
        if (!confirm(`${i18n.confirm_delete_project_permanent}`)) return;

        try {
            await API.project.delete(projectId);
            Utils.showToast(`${i18n.status_deleted}`, 'success');
            loadProjectList();
            // ?ъ씠?쒕컮 紐⑸줉??媛깆떊
            if (window.loadProjects) window.loadProjects();
        } catch (e) {
            Utils.showToast(`${i18n.status_failed_delete}`, 'error');
        }
    }

    // [NEW] Bulk Actions Logic
    function toggleSelectAll(source) {
        const checkboxes = document.getElementsByName('projectSelect');
        for (let cb of checkboxes) {
            cb.checked = source.checked;
        }
        updateBulkActionState();
    }

    function updateBulkActionState() {
        const checkboxes = document.getElementsByName('projectSelect');
        const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
        const bulkActions = document.getElementById('bulkActions');
        const selectedCountSpan = document.getElementById('selectedCount');
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');

        if (checkedCount > 0) {
            bulkActions.classList.remove('hidden');
            selectedCountSpan.textContent = `${checkedCount}${i18n.selected_count_suffix}`;
        } else {
            bulkActions.classList.add('hidden');
        }

        // Update Select All Checkbox state
        if (checkboxes.length > 0 && checkedCount === checkboxes.length) {
            selectAllCheckbox.checked = true;
            selectAllCheckbox.indeterminate = false;
        } else if (checkedCount > 0) {
            selectAllCheckbox.checked = false;
            selectAllCheckbox.indeterminate = true;
        } else {
            selectAllCheckbox.checked = false;
            selectAllCheckbox.indeterminate = false;
        }
    }

    async function deleteSelectedProjects() {
        const checkboxes = document.getElementsByName('projectSelect');
        const selectedIds = Array.from(checkboxes).filter(cb => cb.checked).map(cb => parseInt(cb.value));

        if (selectedIds.length === 0) return;

        if (!confirm(`${i18n.confirm_bulk_delete_prefix} ${selectedIds.length}${i18n.confirm_bulk_delete_suffix}\n${i18n.warn_irreversible}`)) return;

        try {
            // Bulk Delete API Call
            const res = await fetch('/api/projects/bulk-delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: selectedIds })
            });

            const data = await res.json();

            if (res.ok && data.status === 'success') {
                Utils.showToast(`${data.deleted_count}${i18n.status_bulk_deleted_done}`, 'success');
                // Reset Selection
                document.getElementById('selectAllCheckbox').checked = false;
                document.getElementById('selectAllCheckbox').indeterminate = false;
                document.getElementById('bulkActions').classList.add('hidden');

                loadProjectList();
                // Sidebar refresh
                if (window.loadProjects) window.loadProjects();
            } else {
                throw new Error(data.detail || `${i18n.status_failed_delete}`);
            }
        } catch (e) {
            console.error('Bulk delete error:', e);
            Utils.showToast(`${i18n.err_delete_failed_msg}${e.message}`, 'error');
        }
    }

    async function bulkCopyMove(action) {
        const checkboxes = document.getElementsByName('projectSelect');
        const selectedIds = Array.from(checkboxes).filter(cb => cb.checked).map(cb => parseInt(cb.value));
        const targetMode = document.getElementById('targetModeSelect').value;

        if (selectedIds.length === 0) return;

        const actionText = action === 'copy' ? "{{ t('btn_copy') }}" : "{{ t('btn_move') }}";
        const targetModeText = {
            'longform': "{{ t('mode_longform') }}",
            'longform_music': "{{ t('mode_longform_music') }}",
            'shorts': "{{ t('mode_shorts') }}",
            'webtoon': "{{ t('mode_webtoon') }}",
            'commerce': "{{ t('mode_commerce') }}",
            'blog': "{{ t('mode_blog') }}"
        }[targetMode];

        if (!confirm(`${i18n.confirm_bulk_copy_move_prefix} ${selectedIds.length}${i18n.confirm_bulk_copy_move_mid} [${targetModeText}] ${i18n.confirm_bulk_copy_move_suffix} ${actionText}${i18n.confirm_bulk_copy_move_end}`)) return;

        try {
            Utils.showToast(`${actionText}${i18n.status_in_progress_suffix}`, 'info');
            const res = await fetch('/api/projects/bulk-copy-move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    ids: selectedIds,
                    target_mode: targetMode,
                    action: action
                })
            });

            const data = await res.json();

            if (res.ok && data.status === 'success') {
                Utils.showToast(`${data.processed_count}${i18n.status_bulk_action_prefix} ${actionText} ${i18n.status_done}`, 'success');
                // Reset Selection
                document.getElementById('selectAllCheckbox').checked = false;
                document.getElementById('selectAllCheckbox').indeterminate = false;
                document.getElementById('bulkActions').classList.add('hidden');

                loadProjectList();
                // Sidebar refresh
                if (window.loadProjects) window.loadProjects();
            } else {
                throw new Error(data.detail || `${actionText}${i18n.err_action_failed_suffix}`);
            }
        } catch (e) {
            console.error(`${action} error:`, e);
            Utils.showToast(`${i18n.err_generic_msg}${e.message}`, 'error');
        }
    }

    // [NEW] 오늘의 배정 주제 가져오기
    async function fetchDailyTopic() {
        Utils.showToast("{{ t('toast_fetching_topic') }}", "info");
        try {
            const res = await fetch("/api/topics/get-daily", { method: "POST" });
            const data = await res.json();
            
            if (data.status === "success") {
                Utils.showToast("{{ t('toast_project_created') }}", "success");
                
                // Ensure sorting is set to newest
                currentSort = 'newest';
                const sortOrderSelect = document.getElementById('sortOrder');
                if (sortOrderSelect) {
                    sortOrderSelect.value = 'newest';
                }

                if (currentDisplayMode !== 'longform') {
                    // Update global app_mode setting to longform
                    await fetch('/api/settings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ app_mode: 'longform' })
                    });
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    // Refresh list instantly
                    await loadProjectList();
                    // Refresh sidebar projects list
                    if (window.loadProjects) window.loadProjects();
                }
            } else {
                Utils.showToast(data.error || "{{ t('toast_no_assigned_topics') }}", "warning");
            }
        } catch (e) {
            console.error(e);
            Utils.showToast("{{ t('toast_fetch_topic_failed') }}" + e.message, "error");
        }
    }

    document.addEventListener('DOMContentLoaded', loadProjectList);
</script>
